{% extends "base.html" %}
{% block content %}
<div class="login-page">
<div class="form-box">
    <h2>用户登录</h2>
    <form method="post">
        <div class="form-group">
            <label>用户名：</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>密码：</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">登录</button>
    </form>
    <p>没有账号？<a href="{{ url_for('register') }}">去注册</a></p>
</div>
</div>
{% endblock %}
