{% extends "base.html" %}
{% block content %}
<div class="form-box">
    <h2>编辑用户</h2>
    <form method="post">
        <div class="form-group">
            <label>用户名：</label>
            <input type="text" name="username" value="{{ edit_user.username }}" required>
        </div>
        <div class="form-group">
            <label>新密码（留空不修改）：</label>
            <input type="password" name="password">
        </div>
        <div class="form-group">
            <label>角色：</label>
            <select name="role">
                <option value="user" {% if edit_user.role == 'user' %}selected{% endif %}>普通用户</option>
                <option value="admin" {% if edit_user.role == 'admin' %}selected{% endif %}>管理员</option>
            </select>
        </div>
        <button type="submit">保存</button>
        <a href="{{ url_for('user_manage') }}" class="btn">取消</a>
    </form>
</div>
{% endblock %}
