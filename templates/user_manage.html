{% extends "base.html" %}
{% block content %}
<div class="user-manage">
    <h2>用户管理</h2>
    
    <div class="add-user">
        <h3>添加用户</h3>
        <form method="post" action="{{ url_for('user_add') }}">
            <input type="text" name="username" placeholder="用户名" required>
            <input type="password" name="password" placeholder="密码" required>
            <select name="role">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
            <button type="submit">添加</button>
        </form>
    </div>
    
    <h3>用户列表</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>用户名</th>
                <th>角色</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.username }}</td>
                <td>{{ u.role }}</td>
                <td>{{ u.created_at }}</td>
                <td>
                    <a href="{{ url_for('user_edit', user_id=u.id) }}">编辑</a>
                    {% if u.id != user.id %}
                    <a href="{{ url_for('user_delete', user_id=u.id) }}" onclick="return confirm('确定删除？')">删除</a>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
